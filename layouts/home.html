<!DOCTYPE html>
<html lang="{{ .Language.LanguageCode }}">
<head>
    <meta charset="UTF-8">
    {{ partial "head" . }}
</head>
<body>
    <div class="container">
        {{ partial "menu" }}
        <main>
            <section>
                {{ .Content }}
            </section>
            <section>
                {{ partial "stats" }}
            </section>
            <section>
                {{ with .GetPage "featured-projects" }}
                {{ .Content }}
                {{ end }}
            </section>
        </main>
        <section>
            <h2>{{ i18n "My-button" }}:</h2>
            {{ partial "neocities-button" }}
        </section>
        <section>
            <h2>{{ i18n "Other-sites" }}:</h2>
            {{ partial "buttons" }}
        </section>
        {{ partial "footer" }}
    </div>
</body>
</html>
